<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egg Incubator Monitor</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🥚 Egg Incubator</h1>
      <span id="conn-badge" class="badge disconnected">Disconnected</span>
    </header>

    <section class="cards">
      <div class="card">
        <div class="label">Temperature</div>
        <div class="value" id="val-temp">--</div>
        <div class="unit">°C</div>
      </div>
      <div class="card">
        <div class="label">Humidity</div>
        <div class="value" id="val-humidity">--</div>
        <div class="unit">%</div>
      </div>
      <div class="card">
        <div class="label">Heater</div>
        <div class="value" id="val-heater">--</div>
        <div class="unit">%</div>
      </div>
      <div class="card">
        <div class="label">Fan</div>
        <div class="value" id="val-fan">--</div>
        <div class="unit">%</div>
      </div>
      <div class="card wide">
        <div class="label">State</div>
        <div class="value" id="val-state">--</div>
        <div class="sub" id="val-state-reason"></div>
      </div>
      <div class="card wide">
        <div class="label">Day</div>
        <div class="value" id="val-day">--</div>
      </div>
    </section>

    <section class="alarms">
      <h2>Alarms</h2>
      <div class="leds">
        <div class="led" id="led-sensorFail"><span class="dot"></span>Sensor Fail</div>
        <div class="led" id="led-overTemp"><span class="dot"></span>Over Temp</div>
        <div class="led" id="led-underTemp"><span class="dot"></span>Under Temp</div>
        <div class="led" id="led-dhtFail"><span class="dot"></span>DHT Fail</div>
        <div class="led" id="led-humidHigh"><span class="dot"></span>Humid High</div>
        <div class="led" id="led-humidLow"><span class="dot"></span>Humid Low</div>
        <div class="led" id="led-errorState"><span class="dot"></span>Error State</div>
      </div>
      <button id="btn-override" class="toggle" onclick="toggleOverride()">Override Errors</button>
    </section>

    <section class="controls">
      <h2>Quick Commands</h2>
      <div class="btn-group">
        <button onclick="send('help')">Help</button>
        <button onclick="send('status')">Status</button>
        <button onclick="send('species')">Species</button>
      </div>
      <div class="btn-group">
        <button onclick="send('select chicken')">🐔 Chicken</button>
        <button onclick="send('select pigeon')">🕊️ Pigeon</button>
        <button onclick="send('select quail')">🐦 Quail</button>
        <button onclick="send('select duck')">🦆 Duck</button>
        <button onclick="send('select turkey')">🦃 Turkey</button>
        <button onclick="send('select goose')">🪿 Goose</button>
        <button onclick="send('select guinea')">🐓 Guinea</button>
      </div>
      <div class="btn-group">
        <button onclick="send('start')">▶ Start</button>
        <button onclick="send('stop')">■ Stop</button>
        <button onclick="send('pause')">⏸ Pause</button>
        <button onclick="send('resume')">⏵ Resume</button>
      </div>
      <div class="btn-group">
        <button onclick="send('test temp')">Test Temp</button>
        <button onclick="send('test heater 64')">Heater Low</button>
        <button onclick="send('test heater 0')">Heater Off</button>
        <button onclick="send('test heater -1')">Heater Auto</button>
        <button onclick="send('test fan 200')">Fan On</button>
        <button onclick="send('test fan 0')">Fan Off</button>
        <button onclick="send('test motor')">Test Motor</button>
        <button onclick="send('turn')">Turn Eggs</button>
      </div>
      <div class="custom-cmd">
        <label>Max safety temp</label>
        <input type="range" id="maxtemp-range" min="35" max="50" step="0.5" value="40" oninput="updateMaxTempLabel(this.value)" />
        <span id="maxtemp-val">40°C</span>
        <button onclick="sendMaxTemp()">Set</button>
      </div>
      <div class="btn-group">
        <button onclick="send('silence')">Silence</button>
        <button onclick="send('reset')">Reset</button>
      </div>

      <div class="custom-cmd">
        <input type="text" id="cmd-input" placeholder="Type command..." />
        <button onclick="sendInput()">Send</button>
      </div>
    </section>

    <section class="chart-section">
      <h2>Temperature History</h2>
      <div class="chart-wrap">
        <canvas id="tempChart"></canvas>
      </div>
    </section>

    <section class="terminal">
      <h2>Serial Log</h2>
      <pre id="log"></pre>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
