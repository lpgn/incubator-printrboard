; PlatformIO configuration for Printrboard Egg Incubator
; Board: Printrboard Rev D (AT90USB1286 / Teensy++ 2.0 compatible)

[env:printrboard]
platform = teensy
board = teensy2pp
framework = arduino

; Optimize for code size (128KB flash is tight)
build_flags =
    -Os
    -mcall-prologues
    -fno-tree-scev-cprop
    -fno-split-wide-types
    -Wl,--relax
    -DUSB_SERIAL
    -DF_CPU=16000000L

; Serial monitor
monitor_speed = 115200
monitor_dtr = 1

; Upload via USBasp ISP programmer (no BOOT jumper needed)
upload_protocol = custom
upload_command = flash_usbasp.bat $SOURCE
